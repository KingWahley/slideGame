<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sliding Puzzle — Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at top, #bfe9f4, #0f2027);
        color: #0c0c0c;
      }
      .card {
        width: min(520px, 90vw);
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.5;
      }
      .hint {
        font-size: 0.95rem;
        color: #2b2b2b;
      }
      .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 18px;
        border-radius: 999px;
        background: #00b4d8;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        The Sliding Puzzle needs a network connection the first time it loads so
        it can cache everything for offline play.
      </p>
      <p class="hint">Reconnect, then refresh to continue.</p>
      <a class="btn" href="./">Try Again</a>
    </main>
  </body>
</html>
